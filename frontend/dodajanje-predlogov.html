<main>

<div>
<div class="card shadow predlog-card h-100">
<div class="card-body p-4 d-flex flex-column">
    
  <h3 class="fw-bold mb-3 w-100 text-uppercase border-bottom border-danger border-3 pb-1">Dodaj nov predlog</h3>
            
  <form class="d-flex flex-column flex-grow-1">
    <div class="mb-3">
      <label class="form-label fw-bold small">Naslov problema</label>
      <input type="text" id="naslov" class="form-control" placeholder="Npr. Slaba osvetlitev...">
    </div>

    <div class="mb-3 flex-grow-1 d-flex flex-column">
      <label class="form-label fw-bold small">Opis problema</label>
      <textarea id="opis" class="form-control flex-grow-1" style="min-height: 150px;" placeholder="Podrobno opišite..."></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold small">Dodaj sliko</label>
      <input type="file" id="slika" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold small">Tip odločanja / Kategorija</label>
      <select id="tip-odlocanja" class="form-control">
        <option value="1">Poraba proračuna</option>
        <option value="2">Načrtovanje obnov infrastrukture</option>
        <option value="3">Prijava težav v lokalnem okolju</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold small">Izberite lokacijo na zemljevidu</label>
      <div id="map"></div>
    </div>

    <button type="button" id="gumb-objavi" class="btn btn-danger text-white fw-bold w-100 py-3 mt-auto">Objavi predlog</button>
  </form>

</div>
</div>
</div>
