<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Moje mesto - Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4 text-center" style="max-width: 500px; margin: 0 auto;">
            <h2 class="mb-3">Dobrodošli na vašem profilu!</h2>
            <hr>
            <p class="lead">Prijavljeni ste kot:</p>
            <h4>Ime in priimek: <span id="skupnoIme" class="text-danger">Nalaganje...</span></h4>
            <p>E-naslov: <span id="uporabnikEmail" class="fw-bold">Nalaganje...</span></p>
            
            <div class="d-grid gap-2 mt-4">
                <a href="/api/odjava" class="btn btn-outline-secondary">Odjava</a>
            </div>
        </div>
    </div>

    <script>
        // Takoj ko se stran naloži, vprašamo backend za podatke prijavljenega uporabnika
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const res = await fetch("/api/trenutni-uporabnik");
                if (res.status === 401) {
                    // Če uporabnik sploh ni prijavljen, ga vržemo nazaj na prijavo
                    window.location.href = "prijava.html";
                    return;
                }
                const podatki = await res.json();
                
                // Izpišemo podatke na stran
                document.getElementById("skupnoIme").innerText = podatki.ime + " " + podatki.priimek;
                document.getElementById("uporabnikEmail").innerText = podatki.email;
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
